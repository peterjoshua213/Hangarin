{% extends "account/base.html" %}

{% block title %}Login - Hangarin{% endblock %}

{% block content %}
<style>
    /* Override everything to ensure design shows */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        min-height: 100vh !important;
    }

    .auth-wrapper {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .auth-card-container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        width: 100%;
        max-width: 450px;
    }

    .auth-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 40px 30px;
        text-align: center;
        color: white;
    }

    .auth-logo {
        width: 70px;
        height: 70px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        border: 3px solid white;
    }

    .auth-logo svg {
        width: 40px;
        height: 40px;
        stroke: white;
        fill: none;
    }

    .auth-header h1 {
        font-size: 32px;
        font-weight: 700;
        margin: 15px 0 5px;
        color: white;
    }

    .auth-header p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.9);
        margin: 0;
    }

    .auth-body {
        padding: 40px 30px;
    }

    .social-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 25px;
    }

    .social-button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        text-decoration: none;
        transition: all 0.3s ease;
        background: white;
        cursor: pointer;
    }

    .social-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        border-color: #667eea;
        color: #667eea;
    }

    .social-button svg {
        width: 18px;
        height: 18px;
    }

    .divider {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 25px;
        color: #9ca3af;
    }

    .divider-line {
        flex: 1;
        height: 1px;
        background: #e5e7eb;
    }

    .divider-text {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 8px;
    }

    .form-control {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 14px;
        transition: all 0.3s ease;
        background: #f9fafb;
    }

    .form-control:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-control::placeholder {
        color: #9ca3af;
    }

    .form-checkbox {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }

    .form-checkbox input {
        width: 18px;
        height: 18px;
        border: 2px solid #e5e7eb;
        border-radius: 6px;
        cursor: pointer;
        accent-color: #667eea;
        margin-right: 10px;
    }

    .form-checkbox label {
        font-size: 14px;
        color: #374151;
        cursor: pointer;
        margin: 0;
    }

    .btn-login {
        width: 100%;
        padding: 12px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
        transform: translateY(0);
    }

    .auth-footer {
        text-align: center;
        padding-top: 20px;
        border-top: 1px solid #e5e7eb;
        margin-top: 20px;
    }

    .auth-footer p {
        font-size: 13px;
        color: #6b7280;
        margin: 10px 0;
    }

    .auth-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .auth-footer a:hover {
        color: #764ba2;
        text-decoration: underline;
    }

    .error-message {
        color: #dc2626;
        font-size: 13px;
        margin-top: 6px;
        display: block;
    }

    @media (max-width: 600px) {
        .auth-card-container {
            border-radius: 15px;
        }

        .auth-header {
            padding: 30px 20px;
        }

        .auth-body {
            padding: 30px 20px;
        }

        .social-buttons {
            grid-template-columns: 1fr;
        }

        .auth-header h1 {
            font-size: 26px;
        }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card-container">
        <!-- Header -->
        <div class="auth-header">
            <div class="auth-logo">
                <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="30" cy="30" r="28" stroke-width="2"/>
                    <path d="M25 32L28 35L35 25" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Hangarin</h1>
            <p>Task Management Made Simple</p>
        </div>

        <!-- Body -->
        <div class="auth-body">
            <!-- Social Buttons -->
            <div class="social-buttons">
                <a href="/accounts/google/login/" class="social-button">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.91 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z" fill="currentColor"/>
                    </svg>
                    Google
                </a>
                <a href="/accounts/github/login/" class="social-button">
                    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    GitHub
                </a>
            </div>

            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">or</span>
                <div class="divider-line"></div>
            </div>

            <!-- Login Form -->
            <form method="post" novalidate>
                {% csrf_token %}
                
                <!-- Email/Username -->
                <div class="form-group">
                    <label class="form-label" for="login">Email or Username</label>
                    <input type="text" class="form-control" id="login" name="login" placeholder="you@example.com" required autofocus>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <!-- Remember Me -->
                <div class="form-checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Keep me signed in</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-login">
                    <span>Sign In</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p>
                    <a href="{% url 'account_reset_password' %}">Forgot password?</a>
                </p>
                <p>
                    Don't have an account? 
                    <a href="{% url 'account_signup' %}">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
